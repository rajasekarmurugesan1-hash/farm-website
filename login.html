<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - MMM Green Valley Farm</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Segoe UI', Arial, sans-serif;

  background:
    linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
    url('images/farm-bg.jpg');

  background-size:cover;
  background-position:center;
  background-attachment:fixed;

  min-height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  padding:20px;
}

/* LOGIN CARD */
.login-container{

  width:100%;
  max-width:430px;

  background:rgba(255,255,255,0.96);

  backdrop-filter:blur(12px);

  border-radius:24px;

  padding:40px 35px;

  box-shadow:0 15px 45px rgba(0,0,0,0.28);

  position:relative;
}

/* HOME BUTTON */
.home-btn{
  position:absolute;
  top:18px;
  left:18px;

  background:#f3f4f6;
  border:none;

  padding:10px 14px;

  border-radius:10px;

  cursor:pointer;

  font-size:14px;
  font-weight:600;

  transition:0.3s;
}

.home-btn:hover{
  background:#dcfce7;
}

/* LOGO */
.logo-section{
  text-align:center;
  margin-bottom:18px;
}

.logo-section img{
  width:250px;
  height:auto;
  object-fit:contain;
}

/* TITLE */
h1{
  text-align:center;
  color:#14532d;
  font-size:30px;
  margin-bottom:10px;
}

.subtitle{
  text-align:center;
  color:#666;
  font-size:14px;
  margin-bottom:30px;
}

/* INPUT GROUP */
.input-group{
  margin-bottom:20px;
}

.input-group label{
  display:block;
  margin-bottom:8px;

  font-size:14px;
  font-weight:600;

  color:#333;
}

.input-group input{
  width:100%;

  padding:15px;

  border:1px solid #ddd;

  border-radius:14px;

  font-size:15px;

  transition:0.3s;
}

.input-group input:focus{
  outline:none;

  border-color:#16a34a;

  box-shadow:0 0 0 4px rgba(22,163,74,0.15);
}

/* FORGOT PASSWORD */
.forgot-password{
  text-align:right;
  margin-top:-10px;
  margin-bottom:22px;
}

.forgot-password a{
  color:#16a34a;
  text-decoration:none;
  font-size:14px;
  font-weight:600;
}

.forgot-password a:hover{
  text-decoration:underline;
}

/* LOGIN BUTTON */
.login-btn{
  width:100%;

  padding:15px;

  border:none;

  border-radius:14px;

  background:linear-gradient(90deg,#16a34a,#15803d);

  color:white;

  font-size:16px;
  font-weight:700;

  cursor:pointer;

  transition:0.3s;
}

.login-btn:hover{
  transform:translateY(-2px);

  box-shadow:0 10px 25px rgba(22,163,74,0.35);
}

/* REGISTER LINK */
.register-link{
  margin-top:25px;

  text-align:center;

  color:#666;

  font-size:14px;
}

.register-link a{
  color:#16a34a;
  text-decoration:none;
  font-weight:700;
}

.register-link a:hover{
  text-decoration:underline;
}

/* ERROR */
.error-message{
  display:none;

  margin-bottom:18px;

  background:#fee2e2;
  color:#b91c1c;

  padding:12px;

  border-radius:10px;

  text-align:center;

  font-size:14px;
  font-weight:600;
}

/* MOBILE */
@media(max-width:768px){

  .login-container{
    padding:35px 22px;
  }

  h1{
    font-size:24px;
  }

  .logo-section img{
    width:95px;
  }

}

</style>
</head>

<body>

<div class="login-container">

  <!-- HOME -->
  <button class="home-btn" onclick="goHome()">
    ← Home
  </button>

  <!-- LOGO -->
  <div class="logo-section">

    <img src="images/logo.jpg" alt="Farm Logo">

  </div>

  <!-- TITLE -->
  <h1>Welcome Back</h1>

  <p class="subtitle">
    Sign in to continue ordering fresh farm products
  </p>

  <!-- ERROR -->
  <div class="error-message" id="errorMessage">
    Invalid email or password
  </div>

  <!-- EMAIL -->
  <div class="input-group">

    <label>Email Address</label>

    <input
      type="email"
      id="email"
      placeholder="Enter your email"
    >

  </div>

  <!-- PASSWORD -->
  <div class="input-group">

    <label>Password</label>

    <input
      type="password"
      id="password"
      placeholder="Enter your password"
    >

  </div>

  <!-- FORGOT -->
  <div class="forgot-password">

    <a href="#" onclick="forgotPassword()">
      Forgot Password?
    </a>

  </div>

  <!-- LOGIN -->
  <button class="login-btn" onclick="loginUser()">

    Sign In

  </button>

  <!-- REGISTER -->
  <div class="register-link">

    New User?

    <a href="register.html">
      Create Account
    </a>

  </div>

</div>

<script>

/* LOGIN */
function loginUser(){

  let email =
    document.getElementById("email").value.trim();

  let password =
    document.getElementById("password").value;

  let users =
    JSON.parse(localStorage.getItem("users")) || [];

  let user = users.find(u =>
    u.email === email &&
    u.password === password
  );

  if(user){

    localStorage.setItem(
      "loggedInUser",
      JSON.stringify(user)
    );

    window.location.href = "index.html";

  }else{

    document.getElementById(
      "errorMessage"
    ).style.display = "block";

  }

}

/* HOME */
function goHome(){

  window.location.href = "index.html";

}

/* FORGOT PASSWORD */
function forgotPassword(){

  alert(
    "Password reset feature can be added later using email OTP."
  );

}

/* ENTER KEY LOGIN */
document.addEventListener("keypress", function(e){

  if(e.key === "Enter"){
    loginUser();
  }

});

</script>

</body>
</html>
